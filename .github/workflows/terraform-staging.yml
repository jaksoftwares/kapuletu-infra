# GitHub Actions Workflow for Kapuletu Staging Infrastructure
# Automates infrastructure updates when code is pushed to the 'staging' branch.

name: Terraform Staging

on:
  push:
    branches:
      - staging

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Staging Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::123456789012:role/kapuletu-staging-github-actions-role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        working-directory: environments/staging

      - name: Terraform Validate
        run: terraform validate
        working-directory: environments/staging

      - name: Terraform Plan
        run: terraform plan
        working-directory: environments/staging

      - name: Terraform Apply
        if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
        run: terraform apply -auto-approve
        working-directory: environments/staging
